      <tspan x="330" dy="20" fill="#62ef8a">Email      ::</tspan> <tspan fill="#e6edf3">yogiroshan2005@gmail.com</tspan>
      <tspan x="330" dy="16" fill="#62ef8a">LinkedIn   ::</tspan> <tspan fill="#e6edf3">roshanlalyogi</tspan>
