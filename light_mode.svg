<tspan x="20" dy="11.5">####%###********************************##*#*****#</tspan>
<tspan x="20" dy="11.5">%##%#%##********************************###******#</tspan>
    </text>
  </g>

  <!-- RIGHT COLUMN: Interactive Terminal Panel -->
  <g>
    <!-- Zsh Prompt 1: Tech Stack cat command -->
    <text x="330" y="30" font-size="11.5" fill="#008033" font-weight="bold" class="monospace">
      roshan@roshan_os ~ % <tspan fill="#24292f">cat skills.yaml</tspan>
    </text>
    
    <!-- Tech Stack Output -->
    <text x="330" y="50" font-size="10.8" fill="#24292f" xml:space="preserve" class="monospace" style="line-height: 15px;">
      <tspan x="330" dy="0" fill="#57606a">mobile:</tspan>   <tspan fill="#24292f">[Flutter, Dart, Android]</tspan>
      <tspan x="330" dy="15" fill="#57606a">frontend:</tspan> <tspan fill="#24292f">[React, HTML5, CSS3, JavaScript, TypeScript]</tspan>
      <tspan x="330" dy="15" fill="#57606a">backend:</tspan>  <tspan fill="#24292f">[Node.js, Express, REST_API]</tspan>
      <tspan x="330" dy="15" fill="#57606a">ai_ml:</tspan>    <tspan fill="#24292f">[OpenAI, Gemini, Python, RAG, Prompt_Eng.]</tspan>
      <tspan x="330" dy="15" fill="#57606a">databases:</tspan><tspan fill="#24292f">[MySQL, PostgreSQL, MongoDB, Firestore]</tspan>
      <tspan x="330" dy="15" fill="#57606a">tools:</tspan>    <tspan fill="#24292f">[Git, GitHub, Docker, Linux, Postman, Figma, VSCode]</tspan>
    </text>

    <!-- Zsh Prompt 2: Contact curl command -->
    <text x="330" y="168" font-size="11.5" fill="#008033" font-weight="bold" class="monospace">
      roshan@roshan_os ~ % <tspan fill="#24292f">curl -s roshan.os/contact</tspan>
    </text>
    
    <!-- Contact Info Output -->
    <text x="330" y="188" font-size="10.8" fill="#24292f" xml:space="preserve" class="monospace" style="line-height: 15px;">
      <tspan x="330" dy="0" fill="#57606a">email</tspan>    <tspan fill="#008033">-&gt;</tspan> <tspan fill="#24292f">yogiroshan2005@gmail.com</tspan>
      <tspan x="330" dy="15" fill="#57606a">linkedin</tspan> <tspan fill="#008033">-&gt;</tspan> <tspan fill="#24292f">roshanlalyogi</tspan>
      <tspan x="330" dy="15" fill="#57606a">github</tspan>   <tspan fill="#008033">-&gt;</tspan> <tspan fill="#24292f">github.com/rly09</tspan>
    </text>

    <!-- Zsh Prompt 3: git stats status command -->
    <text x="330" y="258" font-size="11.5" fill="#008033" font-weight="bold" class="monospace">
      roshan@roshan_os ~ % <tspan fill="#24292f">git status --stats</tspan>
    </text>
    
    <!-- Git Stats Output -->
    <text x="330" y="278" font-size="10.8" fill="#24292f" xml:space="preserve" class="monospace" style="line-height: 15px;">
      <tspan x="330" dy="0" fill="#57606a">repos:</tspan> <tspan fill="#24292f" font-weight="bold">67</tspan> <tspan fill="#57606a"> | stars:</tspan> <tspan fill="#24292f" font-weight="bold">0</tspan> <tspan fill="#57606a"> | followers:</tspan> <tspan fill="#24292f" font-weight="bold">7</tspan>
      <tspan x="330" dy="15" fill="#57606a">commits:</tspan> <tspan fill="#24292f" font-weight="bold">3944</tspan> <tspan fill="#57606a"> | contributions:</tspan> <tspan fill="#24292f" font-weight="bold">2465</tspan>
      <tspan x="330" dy="15" fill="#57606a">lines_of_code:</tspan> <tspan fill="#24292f" font-weight="bold">27,186,060 LOC</tspan><tspan class="cursor" fill="#008033">_</tspan>
    </text>
  </g>
</svg>
