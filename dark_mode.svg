<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 360" width="830" height="360">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&amp;display=swap');
      
      .monospace {
        font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', Courier, monospace;
      }
      
      /* Animation Keyframes */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor {
        animation: blink 1s step-end infinite;
      }
      
      .glow-accent {
        filter: drop-shadow(0 0 3px rgba(98, 239, 138, 0.4));
      }
    </style>
  </defs>

  <!-- Background Fill -->
  <rect x="0" y="0" width="830" height="360" fill="#0f141c" rx="8" />

  <!-- LEFT COLUMN: Grayscale ASCII Portrait (x=20 to x=285) -->
