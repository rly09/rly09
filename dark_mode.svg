<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 360" width="830" height="360">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&amp;display=swap');
      
      .monospace {
        font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', Courier, monospace;
      }
      
      /* Animation Keyframes */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor {
        animation: blink 1s step-end infinite;
      }
      
      .glow-accent {
        filter: drop-shadow(0 0 3px rgba(98, 239, 138, 0.4));
      }
    </style>
    
    <!-- Dotted Grid Pattern -->
    <pattern id="dot-grid" width="15" height="15" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.8" fill="#1d2433" opacity="0.4" />
    </pattern>
  </defs>

  <!-- Background Base Fill -->
  <rect x="0" y="0" width="830" height="360" fill="#0f141c" rx="8" />
  
  <!-- Dot Grid Pattern Overlay -->
  <rect x="0" y="0" width="830" height="360" fill="url(#dot-grid)" rx="8" />

  <!-- LEFT COLUMN: Grayscale ASCII Portrait -->
  <g>
    <!-- ASCII Art container (starting at x=20, y=30) -->
    <text x="20" y="30" font-size="8.8" fill="#e6edf3" xml:space="preserve" class="monospace" style="line-height: 11.5px; letter-spacing: 0.5px;" opacity="0.9">
