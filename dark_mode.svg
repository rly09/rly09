<tspan x="20" dy="11.5">..........:....=++++++*########*=:--: .      .:   </tspan>
<tspan x="20" dy="11.5">...::::::::::::.:=++*######***=----:    .         </tspan>
<tspan x="20" dy="11.5">.::.:.:::::::.::----==+++==-------        :       </tspan>
<tspan x="20" dy="11.5">.::.            ---:-:-:-::----:                  </tspan>
<tspan x="20" dy="11.5">.:                  ::----:                       </tspan>
<tspan x="20" dy="11.5">.::                               .        .:  .  </tspan>
    </text>
  </g>

  <!-- RIGHT COLUMN: Interactive Terminal Panel -->
  <g>
    <!-- Zsh Prompt 1: Tech Stack cat command -->
    <text x="330" y="30" font-size="11.5" fill="#62ef8a" font-weight="bold" class="monospace">
      roshan@roshan_os ~ % <tspan fill="#e6edf3">cat skills.yaml</tspan>
    </text>
    
    <!-- Tech Stack Output -->
    <text x="330" y="50" font-size="10.8" fill="#e6edf3" xml:space="preserve" class="monospace" style="line-height: 15px;">
      <tspan x="330" dy="0" fill="#8b949e">mobile:</tspan>   <tspan fill="#e6edf3">[Flutter, Dart, Android]</tspan>
      <tspan x="330" dy="15" fill="#8b949e">frontend:</tspan> <tspan fill="#e6edf3">[React, HTML5, CSS3, JavaScript, TypeScript]</tspan>
      <tspan x="330" dy="15" fill="#8b949e">backend:</tspan>  <tspan fill="#e6edf3">[Node.js, Express, REST_API]</tspan>
      <tspan x="330" dy="15" fill="#8b949e">ai_ml:</tspan>    <tspan fill="#e6edf3">[OpenAI, Gemini, Python, RAG, Prompt_Eng.]</tspan>
      <tspan x="330" dy="15" fill="#8b949e">databases:</tspan><tspan fill="#e6edf3">[MySQL, PostgreSQL, MongoDB, Firestore]</tspan>
      <tspan x="330" dy="15" fill="#8b949e">tools:</tspan>    <tspan fill="#e6edf3">[Git, GitHub, Docker, Linux, Postman, Figma, VSCode]</tspan>
    </text>

    <!-- Zsh Prompt 2: Contact curl command -->
    <text x="330" y="168" font-size="11.5" fill="#62ef8a" font-weight="bold" class="monospace">
      roshan@roshan_os ~ % <tspan fill="#e6edf3">curl -s roshan.os/contact</tspan>
    </text>
    
    <!-- Contact Info Output -->
    <text x="330" y="188" font-size="10.8" fill="#e6edf3" xml:space="preserve" class="monospace" style="line-height: 15px;">
      <tspan x="330" dy="0" fill="#8b949e">email</tspan>    <tspan fill="#62ef8a">-&gt;</tspan> <tspan fill="#e6edf3">yogiroshan2005@gmail.com</tspan>
      <tspan x="330" dy="15" fill="#8b949e">linkedin</tspan> <tspan fill="#62ef8a">-&gt;</tspan> <tspan fill="#e6edf3">roshanlalyogi</tspan>
      <tspan x="330" dy="15" fill="#8b949e">github</tspan>   <tspan fill="#62ef8a">-&gt;</tspan> <tspan fill="#e6edf3">github.com/rly09</tspan>
    </text>

    <!-- Zsh Prompt 3: git stats status command -->
    <text x="330" y="258" font-size="11.5" fill="#62ef8a" font-weight="bold" class="monospace">
      roshan@roshan_os ~ % <tspan fill="#e6edf3">git status --stats</tspan>
    </text>
    
    <!-- Git Stats Output -->
    <text x="330" y="278" font-size="10.8" fill="#e6edf3" xml:space="preserve" class="monospace" style="line-height: 15px;">
      <tspan x="330" dy="0" fill="#8b949e">repos:</tspan> <tspan fill="#e6edf3" font-weight="bold">67</tspan> <tspan fill="#8b949e"> | stars:</tspan> <tspan fill="#e6edf3" font-weight="bold">0</tspan> <tspan fill="#8b949e"> | followers:</tspan> <tspan fill="#e6edf3" font-weight="bold">7</tspan>
      <tspan x="330" dy="15" fill="#8b949e">commits:</tspan> <tspan fill="#e6edf3" font-weight="bold">3944</tspan> <tspan fill="#8b949e"> | contributions:</tspan> <tspan fill="#e6edf3" font-weight="bold">2465</tspan>
      <tspan x="330" dy="15" fill="#8b949e">lines_of_code:</tspan> <tspan fill="#e6edf3" font-weight="bold">27,186,060 LOC</tspan><tspan class="cursor" fill="#62ef8a">_</tspan>
    </text>
  </g>
</svg>
