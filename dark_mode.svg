<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 430" width="830" height="430">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&amp;display=swap');
      
      .monospace {
        font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', Courier, monospace;
      }
      
      /* Animation Keyframes */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor {
        animation: blink 1s step-end infinite;
      }
      
      .glow-accent {
        filter: drop-shadow(0 0 3px rgba(98, 239, 138, 0.4));
      }
    </style>
    
    <!-- Dotted Grid Pattern -->
    <pattern id="dot-grid" width="15" height="15" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.8" fill="#1d2433" opacity="0.4" />
    </pattern>
  </defs>

  <!-- Background Base Fill -->
  <rect x="0" y="0" width="830" height="430" fill="#0f141c" rx="8" />
  
  <!-- Dot Grid Pattern Overlay -->
  <rect x="0" y="0" width="830" height="430" fill="url(#dot-grid)" rx="8" />

  <!-- LEFT COLUMN: Grayscale ASCII Portrait -->
  <g>
    <!-- ASCII Art container (starting at x=15, y=22) -->
    <text x="15" y="22" font-size="10.5" fill="#e6edf3" xml:space="preserve" class="monospace" style="line-height: 15.0px; letter-spacing: 0.5px;" opacity="0.9">
<tspan x="15" dy="0">                                                    </tspan>
<tspan x="15" dy="15.0">                     ..... .                        </tspan>
<tspan x="15" dy="15.0">                 ................                   </tspan>
<tspan x="15" dy="15.0">              .....................                 </tspan>
<tspan x="15" dy="15.0">             .... ...........  .....                </tspan>
<tspan x="15" dy="15.0">                             ..   ...               </tspan>
<tspan x="15" dy="15.0">                : ::.=-=:.-+=#*-=   .               </tspan>
<tspan x="15" dy="15.0">               =**%%%%####%%%#%%%+                  </tspan>
<tspan x="15" dy="15.0">               *+====+####*=----*#.                 </tspan>
<tspan x="15" dy="15.0">               +-==+==*###*++++==#:.                </tspan>
<tspan x="15" dy="15.0">            =*:+**# -#**###%= *###=**#              </tspan>
<tspan x="15" dy="15.0">            ++=++*%:=%######*:#%##*=#*              </tspan>
<tspan x="15" dy="15.0">            =*=++######*##########+*#               </tspan>
<tspan x="15" dy="15.0">             ++++######*############                </tspan>
<tspan x="15" dy="15.0">               =+*#**########+###+*                 </tspan>
<tspan x="15" dy="15.0">                =+##*+*####***##*                   </tspan>
<tspan x="15" dy="15.0">                 -+*###*+**####+                    </tspan>
<tspan x="15" dy="15.0">                  =++*######*+#+                    </tspan>
<tspan x="15" dy="15.0">                  =*+++****++*#+:--                 </tspan>
<tspan x="15" dy="15.0">              . -+++++++++**#####+-----             </tspan>
<tspan x="15" dy="15.0">              . -**++++**########=--=-------        </tspan>
<tspan x="15" dy="15.0">                 -++**#########+----------------    </tspan>
<tspan x="15" dy="15.0">           ----- :--=+*****+==-------------------   </tspan>
<tspan x="15" dy="15.0">     :------------=-------------------------------  </tspan>
<tspan x="15" dy="15.0">     -=-------------------------------------------- </tspan>
<tspan x="15" dy="15.0">     ---------------------------------------------- </tspan>
<tspan x="15" dy="15.0">     :------------------------------------:--------:</tspan>
<tspan x="15" dy="15.0">      :-----------------------------------::--------</tspan>
    </text>
  </g>

  <!-- RIGHT COLUMN: Interactive Terminal Panel -->
  <g>
    <!-- Zsh Prompt 1: Tech Stack cat command -->
    <text x="395" y="25" font-size="13.0" fill="#62ef8a" font-weight="bold" class="monospace">
      roshan@roshan_os ~ % <tspan fill="#e6edf3">cat skills.yaml</tspan>
    </text>
    
    <!-- Tech Stack Output -->
    <text x="395" y="48" font-size="11.0" fill="#e6edf3" xml:space="preserve" class="monospace" style="line-height: 20px;">
      <tspan x="395" dy="0" fill="#8b949e">mobile:</tspan>   <tspan fill="#e6edf3">[Flutter, Dart, Android]</tspan>
      <tspan x="395" dy="20" fill="#8b949e">frontend:</tspan> <tspan fill="#e6edf3">[React, HTML5, CSS3, JavaScript, TypeScript]</tspan>
      <tspan x="395" dy="20" fill="#8b949e">backend:</tspan>  <tspan fill="#e6edf3">[Node.js, Express, FastAPI]</tspan>
      <tspan x="395" dy="20" fill="#8b949e">ai_ml:</tspan>    <tspan fill="#e6edf3">[OpenAI, Gemini, Python, RAG, Prompt_Eng.]</tspan>
      <tspan x="395" dy="20" fill="#8b949e">databases:</tspan><tspan fill="#e6edf3">[MySQL, PostgreSQL, MongoDB, Firestore]</tspan>
      <tspan x="395" dy="20" fill="#8b949e">tools:</tspan>    <tspan fill="#e6edf3">[Git, GitHub, Docker, Linux, Postman, Figma, VSCode]</tspan>
    </text>

    <!-- Zsh Prompt 2: Contact curl command -->
    <text x="395" y="205" font-size="13.0" fill="#62ef8a" font-weight="bold" class="monospace">
      roshan@roshan_os ~ % <tspan fill="#e6edf3">curl -s roshan.os/contact</tspan>
    </text>
    
    <!-- Contact Info Output -->
    <text x="395" y="228" font-size="11.0" fill="#e6edf3" xml:space="preserve" class="monospace" style="line-height: 20px;">
      <tspan x="395" dy="0" fill="#8b949e">email</tspan>    <tspan fill="#62ef8a">-&gt;</tspan> <tspan fill="#e6edf3">yogiroshan2005@gmail.com</tspan>
      <tspan x="395" dy="20" fill="#8b949e">linkedin</tspan> <tspan fill="#62ef8a">-&gt;</tspan> <tspan fill="#e6edf3">roshanlalyogi</tspan>
      <tspan x="395" dy="20" fill="#8b949e">github</tspan>   <tspan fill="#62ef8a">-&gt;</tspan> <tspan fill="#e6edf3">github.com/rly09</tspan>
    </text>

    <!-- Zsh Prompt 3: git stats status command -->
    <text x="395" y="325" font-size="13.0" fill="#62ef8a" font-weight="bold" class="monospace">
      roshan@roshan_os ~ % <tspan fill="#e6edf3">git status --stats</tspan>
    </text>
    
    <!-- Git Stats Output -->
    <text x="395" y="348" font-size="11.0" fill="#e6edf3" xml:space="preserve" class="monospace" style="line-height: 20px;">
      <tspan x="395" dy="0" fill="#8b949e">repos:</tspan> <tspan fill="#e6edf3" font-weight="bold">49</tspan> <tspan fill="#8b949e"> | stars:</tspan> <tspan fill="#e6edf3" font-weight="bold">1</tspan> <tspan fill="#8b949e"> | followers:</tspan> <tspan fill="#e6edf3" font-weight="bold">7</tspan>
      <tspan x="395" dy="20" fill="#8b949e">commits:</tspan> <tspan fill="#e6edf3" font-weight="bold">286</tspan> <tspan fill="#8b949e"> | contributions:</tspan> <tspan fill="#e6edf3" font-weight="bold">402</tspan>
      <tspan x="395" dy="20" fill="#8b949e">lines_of_code:</tspan> <tspan fill="#e6edf3" font-weight="bold">1.80M LOC</tspan><tspan class="cursor" fill="#62ef8a">_</tspan>
    </text>
  </g>
</svg>
