<tspan x="20" dy="11.5">-::-:-:---=-:++** .*#+*####+ :**##-+*+..:--:-:::: </tspan>
<tspan x="20" dy="11.5">-:::--:--=+=-+=*% :%##*##*##.:%#*#*=+*..:----:::: </tspan>
<tspan x="20" dy="11.5">------:---+==++####*#**###*###**#*+=#=.:--:-:--:: </tspan>
<tspan x="20" dy="11.5">--::------=+==+####*#**#*###*####***+:..-:-=:--:: </tspan>
<tspan x="20" dy="11.5">:::::----::-==+*#*###******##*#*#++-.::.::--::-:: </tspan>
<tspan x="20" dy="11.5">:-::::::--::.:=*#*=+*######*=+##*..:::..:::::: :: </tspan>
<tspan x="20" dy="11.5">::::-:::--:::.:=*##++********##*:.::::..:::::- :: </tspan>
<tspan x="20" dy="11.5">:::::::-:----:..-+###*+++*###*+:..:::.....:---    </tspan>
<tspan x="20" dy="11.5">::::::::-::-:::.-==+*##*###*++*-::::...:::::-::   </tspan>
